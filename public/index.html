<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConfigGen 面板</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>ConfigGen 面板</h1>
      <p>多客户端配置生成器</p>
    </header>

    <div class="main-content">
      <!-- 节点配置 -->
      <section class="card">
        <h2>🖥️ 节点配置</h2>
        <div class="node-editor">
          <textarea id="node-config" placeholder='粘贴你的节点配置 JSON...'></textarea>
          <div class="node-actions">
            <button onclick="saveNodes()" class="btn-save">保存节点</button>
            <button onclick="loadNodes()" class="btn-load">加载节点</button>
          </div>
          <div id="node-status" class="status-text"></div>
        </div>
      </section>

      <!-- CDN 选择 -->
      <section class="card">
        <h2>🚀 CDN 加速</h2>
        <div class="cdn-selector">
          <select id="cdn-select">
            <option value="0">官方源</option>
            <option value="1" selected>ghfast.top</option>
            <option value="2">ghproxy.com</option>
            <option value="3">mirror.ghproxy.com</option>
          </select>
        </div>
      </section>

      <!-- 订阅地址 -->
      <section class="card">
        <h2>📡 订阅地址</h2>
        <div class="subscription-links">
          <div class="link-item">
            <span class="label">Clash</span>
            <input type="text" id="sub-clash" readonly value="">
            <button onclick="copyLink('sub-clash')">复制</button>
          </div>
          <div class="link-item">
            <span class="label">Sing-box</span>
            <input type="text" id="sub-singbox" readonly value="">
            <button onclick="copyLink('sub-singbox')">复制</button>
          </div>
        </div>
      </section>

      <!-- 规则集 -->
      <section class="card">
        <h2>📋 规则集</h2>
        <div id="rules-list" class="rules-grid"></div>
      </section>

      <!-- 生成配置 -->
      <section class="card">
        <h2>⚙️ 配置生成</h2>
        <div class="generate-section">
          <select id="client-type">
            <option value="singbox">Sing-box</option>
            <option value="clash">Clash / Clash Meta</option>
            <option value="surge">Surge / Shadowrocket</option>
          </select>
          <button onclick="generateConfig()">生成配置</button>
        </div>
        <pre id="config-output" class="config-preview"></pre>
        <div class="action-buttons">
          <button onclick="downloadConfig()" id="btn-download" class="btn-download" style="display:none">下载配置</button>
          <button onclick="copyConfig()" id="btn-copy" class="btn-copy" style="display:none">复制内容</button>
        </div>
      </section>
    </div>

    <footer>
      <p>ConfigGen Panel | 配置仅保存在本地</p>
    </footer>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
